name: Deploy Prod (Android)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test -- --ci

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # to attach the AAB to a GitHub Release
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - run: npm ci

      - name: Derive version name from tag (v1.2.0 -> 1.2.0)
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Write .env.prod from secret
        run: printf '%s\n' "${{ secrets.ENV_PROD }}" > .env.prod

      - name: Prepare release notes from RELEASE_NOTES.md
        run: sed "s/{{VERSION}}/${{ steps.version.outputs.name }}/" RELEASE_NOTES.md > /tmp/release-notes.md

      - name: Build prod AAB (Play Store) and APK (sideload/GitHub Release)
        working-directory: android
        run: |
          ENVFILE=.env.prod ./gradlew bundleRelease assembleRelease \
            -PversionCode=${{ github.run_number }} \
            -PversionName=${{ steps.version.outputs.name }}

      - uses: actions/upload-artifact@v7
        with:
          name: splitkaro-prod-${{ github.ref_name }}
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk

      - name: Attach AAB + APK to the GitHub Release for this tag
        uses: softprops/action-gh-release@v3
        with:
          name: "Splitkaro ${{ steps.version.outputs.name }}"
          body_path: /tmp/release-notes.md
          files: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk

      # Once fastlane/Fastfile's upload_to_play_store is wired with a real
      # PLAY_STORE_JSON_KEY secret (see fastlane/Appfile) and the release
      # signing config is switched off the debug keystore, uncomment this to
      # push straight to the Play Console internal track instead of a manual upload:
      # - name: Upload to Play Console
      #   env:
      #     PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
      #   run: bundle exec fastlane android prod
